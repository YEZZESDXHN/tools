# .github/workflows/build-feishu-exe.yml
name: Build Feishu Message EXE

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build-windows-exe:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：设置Go环境
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      # 步骤3：进入子目录，修复依赖（核心：新增go mod tidy）
      - name: Fix Go dependencies
        working-directory: ./feishu_send_msg
        run: |
          # 关键：tidy会自动补全go.mod、生成go.sum，解决缺失问题
          go mod tidy
          # 下载依赖（可选，tidy已包含下载逻辑，这里加了更保险）
          go mod download

      # 步骤4：编译EXE（输出到根目录）
      - name: Build Windows EXE
        working-directory: ./feishu_send_msg
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../feishu-send-msg.exe main.go
          # 验证编译结果
          if [ -f ../feishu-send-msg.exe ]; then
            echo "编译成功：EXE文件已生成"
            file ../feishu-send-msg.exe
          else
            echo "编译失败：未找到EXE文件"
            exit 1
          fi

      # 步骤5：上传产物
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: feishu-send-msg-windows
          path: ./feishu-send-msg.exe
          retention-days: 30
